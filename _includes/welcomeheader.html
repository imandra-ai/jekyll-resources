<header>
  <div class="top-row-container">
    <div class="top-row">
      <div class="side__logo-container">
        <a class="side__logo-link" href="{{ site.url }}">
          <img
            class="side__logo"
            src="{{ site.baseurl }}/jekyll-resources/assets/img/imandra-gradient-logo-docs.svg"
            alt="Imandra Logo"
          />
          <img
            class="side__logo--min"
            src="{{ site.baseurl }}/jekyll-resources/assets/img/imandra-gradient-logo-min.svg"
            alt="Imandra Logo"
          />
        </a>
      </div>

      <div id="flex-space-helper"></div>
    </div>
  </div>

  <div class="template-header">
    <div class="top-bar">
      <nav class="top-bar__nav-container" id="top-menu">
        <div class="page-header-nav-container">
          <div class="side__nav-search">
            <div class="side__nav-search-icon">
              <i class="fa fa-search"></i>
            </div>
            <input id="search" type="search" placeholder="Search" />
          </div>
        </div>
      </nav>
    </div>
  </div>

  <div class="page-nav-mobile-menu-container" hidden>
    <nav class="page-nav-menu">
      <button
        aria-haspopup="true"
        aria-expanded="false"
        class="page-header-menu-nav__button type--nav-close"
      >
        <svg
          version="1.1"
          class="page-header-menu-nav__icon"
          xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink"
          x="0px"
          y="0px"
          viewBox="0 0 32 32"
          style="enable-background: new 0 0 32 32"
          xml:space="preserve"
        >
          <rect
            class="page-header-menu-nav__icon-path--close"
            x="14"
            y="0.5"
            transform="matrix(0.7071 -0.7071 0.7071 0.7071 -6.981 16.1464)"
            width="4"
            height="32"
          />
          <rect
            class="page-header-menu-nav__icon-path--close"
            x=" 0"
            y="14.5"
            transform="matrix(0.7071 -0.7071 0.7071 0.7071 -6.981 16.1464)"
            width="32"
            height="4"
          />
        </svg>
      </button>
    </nav>
  </div>

</header>
